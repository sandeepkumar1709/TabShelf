<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TabCache Sessions</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      header {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(127, 127, 127, 0.25);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
      }
      header .muted {
        opacity: 0.75;
        font-size: 13px;
      }
      main {
        display: grid;
        grid-template-columns: 360px 1fr;
        min-height: calc(100vh - 54px);
      }
      aside {
        border-right: 1px solid rgba(127, 127, 127, 0.25);
        padding: 12px;
        overflow: auto;
      }
      section {
        padding: 12px;
        overflow: auto;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      button {
        appearance: none;
        border: 1px solid rgba(127, 127, 127, 0.35);
        background: rgba(127, 127, 127, 0.10);
        border-radius: 10px;
        padding: 8px 10px;
        font-weight: 650;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 9px 10px;
        border-radius: 10px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        background: rgba(127, 127, 127, 0.06);
        font: inherit;
      }
      .sessionList {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sessionItem {
        border: 1px solid rgba(127, 127, 127, 0.25);
        background: rgba(127, 127, 127, 0.06);
        border-radius: 12px;
        padding: 10px;
        cursor: pointer;
      }
      .sessionItem.active {
        outline: 2px solid rgba(80, 140, 255, 0.55);
      }
      .sessionItem .name {
        font-weight: 700;
        margin-bottom: 4px;
        word-break: break-word;
      }
      .sessionItem .meta {
        opacity: 0.75;
        font-size: 12px;
      }
      .detailHeader {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }
      .detailHeader h2 {
        margin: 0;
        font-size: 16px;
      }
      .pillRow {
        margin-top: 6px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(127, 127, 127, 0.25);
        background: rgba(127, 127, 127, 0.08);
        font-size: 12px;
        opacity: 0.95;
      }
      .tabsList {
        margin-top: 12px;
        border: 1px solid rgba(127, 127, 127, 0.22);
        border-radius: 12px;
        padding: 10px;
        background: rgba(127, 127, 127, 0.05);
        max-width: 980px;
      }
      .tabItem {
        padding: 8px 0;
        border-bottom: 1px solid rgba(127, 127, 127, 0.18);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: start;
      }
      .tabItem:last-child {
        border-bottom: none;
      }
      .t {
        font-weight: 650;
        margin-bottom: 3px;
        word-break: break-word;
        text-decoration: none;
        color: inherit;
      }
      .u {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        opacity: 0.85;
        word-break: break-all;
        text-decoration: none;
        color: inherit;
      }
      .tabActions {
        display: flex;
        align-items: center;
      }
      .iconBtn {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        border: 1px solid rgba(127, 127, 127, 0.3);
        background: rgba(127, 127, 127, 0.08);
        cursor: pointer;
        font-weight: 800;
        line-height: 1;
      }
      .iconBtn:hover {
        background: rgba(127, 127, 127, 0.14);
      }
      .status {
        margin-top: 10px;
        min-height: 20px;
        opacity: 0.85;
      }
      .empty {
        opacity: 0.75;
        padding: 10px 0;
      }
      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
        }
        aside {
          border-right: none;
          border-bottom: 1px solid rgba(127, 127, 127, 0.25);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>TabCache Sessions</h1>
        <div class="muted">Saved locally in this browser profile</div>
      </div>
      <button id="refresh">Refresh</button>
    </header>

    <main>
      <aside>
        <div class="toolbar">
          <div class="muted" id="countLabel"></div>
        </div>
        <div class="sessionList" id="sessionList"></div>
      </aside>

      <section>
        <div id="detail"></div>
        <div class="status" id="status"></div>
      </section>
    </main>

    <script src="sessions.js"></script>
  </body>
</html>
